name: Publish to GitHub Packages

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghpkg
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Rewrite package.json for scoped publish
        run: |
          PUBLISH_VERSION=$(node -e "
            const pkg = require('./package.json');
            const [major, minor, patch] = String(pkg.version).split('.').map(Number);
            const runNumber = Number(process.env.GITHUB_RUN_NUMBER || 0);
            if ([major, minor, patch].some(Number.isNaN)) {
              throw new Error('Invalid upstream version: ' + pkg.version);
            }
            console.log([major, minor, patch * 1000 + runNumber].join('.'));
          ")

          node -e "
            const pkg = require('./package.json');
            pkg.name = '@mc-nekoneko/openclaw-supermemory';
            pkg.version = '${PUBLISH_VERSION}';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            delete pkg.peerDependencies;
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing @mc-nekoneko/openclaw-supermemory@${PUBLISH_VERSION}"

      - name: Publish
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
